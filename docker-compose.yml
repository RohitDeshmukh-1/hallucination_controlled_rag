services:

 backend:

 build: .

 container_name: rag_backend

 ports:

 - "8000:7860"

 env_file:

 - .env

 volumes:

 - ./storage:/app/storage

 healthcheck:

 test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]

 interval: 30s

 timeout: 10s

 retries: 3

 start_period: 60s

 deploy:

 resources:

 limits:

 memory: 2G



 webapp:

 build: 

 context: .

 dockerfile: Dockerfile.frontend

 container_name: rag_webapp

 ports:

 - "8501:8501"

 environment:

 - API_URL=http://backend:7860

 depends_on:

 backend:

 condition: service_healthy

